<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Noto Sans KR';
    src: url('../fonts/NotoSansKR-Regular.ttf') format('truetype');
    font-weight: 100 900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }
  .card {
    position: relative; width: 1080px; height: 1920px;
    font-family: 'Noto Sans KR', sans-serif; color: #FFFFFF;
  }
  .bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 1; }
  .overlay {
    position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.25) 35%, rgba(0,0,0,0.55) 70%, rgba(0,0,0,0.85) 100%);
  }

  /* 상단 브랜드 (세이프존 안쪽) */
  .brand-top {
    position: absolute; top: 150px; left: 90px; z-index: 4;
    display: flex; align-items: center; gap: 20px;
  }
  .brand-top img { width: 84px; height: 84px; border-radius: 50%; }
  .brand-top .name { font-size: 42px; font-weight: 800; color: #CFFF04; letter-spacing: 1px; }

  /* 중앙 자막(나레이션) — 좌우/하단 데드존 회피 */
  .subtitle-wrap {
    position: absolute; left: 0; right: 0; top: 40%; z-index: 5;
    display: flex; justify-content: center; padding: 0 130px;
  }
  .subtitle {
    max-width: 840px; text-align: center;
    font-size: 52px; font-weight: 800; line-height: 1.42; color: #FFFFFF;
    letter-spacing: -1.5px;
    background: rgba(0,0,0,0.56); border-radius: 28px; padding: 34px 44px;
    text-shadow: 0 4px 18px rgba(0,0,0,0.8);
  }
  .subtitle b { color: #CFFF04; font-weight: 900; }

  /* 아웃트로 — 완전 검정 배경 + 로고만 */
  .outro {
    position: absolute; inset: 0; z-index: 10; background: #000000;
    display: flex; align-items: center; justify-content: center;
  }
  .outro img { width: 560px; height: 560px; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="bg" id="bg"></div>
    <div class="overlay" id="overlay"></div>
    <div class="brand-top" id="brand-top">
      <img id="brand-logo" src="">
      <span class="name">GLEND</span>
    </div>
    <div class="subtitle-wrap" id="subtitle-wrap">
      <div class="subtitle" id="subtitle"></div>
    </div>
    <div class="outro" id="outro" style="display:none;">
      <img id="outro-logo" src="">
    </div>
  </div>
</body>
</html>
