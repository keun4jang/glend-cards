<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Noto Sans KR';
    src: url('../fonts/NotoSansKR-Regular.ttf') format('truetype');
    font-weight: 100 900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }
  .card {
    position: relative; width: 1080px; height: 1920px;
    font-family: 'Noto Sans KR', sans-serif; color: #FFFFFF;
  }
  .bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 1; opacity: 0.9; }
  .overlay {
    position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(180deg, rgba(0,0,0,0.22) 0%, rgba(0,0,0,0.12) 45%, rgba(0,0,0,0.35) 100%);
  }

  /* 상단 브랜드 */
  .brand-top {
    position: absolute; top: 150px; left: 90px; z-index: 6;
    display: flex; align-items: center; gap: 20px;
  }
  .brand-top img { width: 84px; height: 84px; border-radius: 50%; }
  .brand-top .name { font-size: 42px; font-weight: 800; color: #CFFF04; letter-spacing: 1px; }

  /* 후킹 장면 — 그레이 그라데이션 배경 + 크고 예쁜 글씨(박스 없음) */
  .hook {
    position: absolute; inset: 0; z-index: 3;
    background: linear-gradient(155deg, #3c4046 0%, #74787e 48%, #2e3034 100%);
    display: flex; align-items: center; justify-content: center; padding: 0 100px;
  }
  .hook-text {
    text-align: center; max-width: 900px;
    font-size: 96px; font-weight: 900; line-height: 1.28; letter-spacing: -3px;
    text-wrap: balance; word-break: keep-all;
    text-shadow: 0 6px 26px rgba(0,0,0,0.55);
  }
  .hook-text b { color: #CFFF04; }

  /* 고정 제목(주제) — 자막 바로 위, 밑줄 강조 헤드라인 */
  .reel-title {
    position: absolute; left: 0; right: 0; top: 33%; z-index: 5;
    display: flex; justify-content: center; padding: 0 90px;
  }
  .reel-title span {
    color: #FFFFFF; font-weight: 900; font-size: 60px; letter-spacing: -1.5px;
    text-align: center; padding-bottom: 12px; border-bottom: 8px solid #CFFF04;
    text-shadow: 0 3px 12px rgba(0,0,0,0.9);
  }

  /* 중앙 자막(나레이션) — 박스 없이 글씨만, 강한 그림자로 가독성 */
  .subtitle-wrap {
    position: absolute; left: 0; right: 0; top: 41%; z-index: 5;
    display: flex; justify-content: center; padding: 0 110px;
  }
  .subtitle {
    max-width: 840px; text-align: center; color: #FFFFFF;
    font-size: 46px; font-weight: 800; line-height: 1.5; letter-spacing: -1px;
    text-wrap: balance; word-break: keep-all;
    text-shadow: 0 3px 12px rgba(0,0,0,0.95), 0 0 8px rgba(0,0,0,0.9), 0 2px 3px rgba(0,0,0,1);
  }
  .subtitle b { color: #CFFF04; font-weight: 900; }

  /* 아웃트로 — 완전 검정 + 로고 */
  .outro {
    position: absolute; inset: 0; z-index: 10; background: #000000;
    display: flex; align-items: center; justify-content: center;
  }
  .outro img { width: 780px; height: 780px; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="bg" id="bg"></div>
    <div class="overlay" id="overlay"></div>
    <div class="hook" id="hook" style="display:none;">
      <div class="hook-text" id="hook-text"></div>
    </div>
    <div class="brand-top" id="brand-top">
      <img id="brand-logo" src="">
      <span class="name">GLEND</span>
    </div>
    <div class="reel-title" id="reel-title" style="display:none;">
      <span id="reel-title-text"></span>
    </div>
    <div class="subtitle-wrap" id="subtitle-wrap">
      <div class="subtitle" id="subtitle"></div>
    </div>
    <div class="outro" id="outro" style="display:none;">
      <img id="outro-logo" src="">
    </div>
  </div>
</body>
</html>
