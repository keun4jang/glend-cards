<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Noto Sans KR';
    src: url('../fonts/NotoSansKR-Regular.ttf') format('truetype');
    font-weight: 100 900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  .card {
    position: relative; width: 1080px; height: 1920px;
    font-family: 'Noto Sans KR', sans-serif; color: #FFFFFF;
  }
  .bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 1; }
  .overlay {
    position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.35) 40%, rgba(0,0,0,0.88) 100%);
  }
  .content {
    position: absolute; inset: 0; z-index: 3; padding: 110px 90px 200px;
    display: flex; flex-direction: column; justify-content: flex-end;
    text-align: left; align-items: flex-start;
  }

  /* 브랜드 로고 (상단) */
  .brand-top {
    position: absolute; top: 80px; left: 90px; z-index: 4;
    display: flex; align-items: center; gap: 20px;
  }
  .brand-top img { width: 90px; height: 90px; border-radius: 50%; }
  .brand-top .name { font-size: 44px; font-weight: 800; color: #CFFF04; letter-spacing: 1px; }

  /* 후킹(첫 장면) 대형 제목 */
  .hook-title {
    font-weight: 900; line-height: 1.14; text-align: left; margin-bottom: 40px;
  }
  .hook-title .line { display: block; white-space: nowrap; }
  .hook-sub { font-size: 60px; font-weight: 700; color: #CFFF04; }

  /* 일반 장면 텍스트 (하단, 카드뉴스 본문 스타일) */
  .scene-text {
    font-weight: 800; line-height: 1.28; text-align: left;
    border-left: 16px solid #CFFF04; padding-left: 40px;
  }
  .scene-text .line { display: block; }
  .scene-text b { color: #CFFF04; font-weight: 900; }

  /* 브랜드 아웃트로 (마지막 장면) */
  .brand-outro {
    position: absolute; inset: 0; z-index: 3;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 50px;
  }
  .brand-outro img { width: 420px; height: 420px; }
  .brand-outro .cta { font-size: 66px; font-weight: 800; color: #FFFFFF; text-align: center; line-height: 1.3; }
  .brand-outro .cta b { color: #CFFF04; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="bg" id="bg"></div>
    <div class="overlay" id="overlay"></div>
    <div class="brand-top" id="brand-top">
      <img id="brand-logo" src="">
      <span class="name">GLEND</span>
    </div>
    <div class="content" id="content">
      <div id="body-area" style="display:flex;flex-direction:column;width:100%;"></div>
    </div>
  </div>
</body>
</html>
