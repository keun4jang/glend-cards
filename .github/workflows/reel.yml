name: Daily Reel Post

on:
  workflow_dispatch:
    inputs:
      index:
        description: "릴스 카테고리 (auto=날짜별 로테이션, 1=경제 2=사건사고 3=건강)"
        required: false
        default: "auto"
      publish:
        description: "실제 발행 여부 (false면 영상만 만들고 검토)"
        required: false
        default: "true"
      upload_only:
        description: "true면 새로 안 만들고 이미 커밋된 영상만 발행"
        required: false
        default: "false"
  schedule:
    - cron: "0 8 * * *"   # 매일 UTC 08:00 = KST 17:00 (인스타 릴스 1개 자동)

permissions:
  contents: write

jobs:
  reel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run reel pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          TTS_ENGINE: ${{ vars.TTS_ENGINE }}
          PUBLISH: ${{ github.event.inputs.publish || 'true' }}
          UPLOAD_ONLY: ${{ github.event.inputs.upload_only || 'false' }}
        run: python daily_reel_ci.py ${{ github.event.inputs.index || 'auto' }}
